# docker-compose.override.yml — REFERENCE TEMPLATE (Stack Harbor / SwarmClaw JPS)
#
# SwarmClaw's upstream docker-compose.yml already declares:
#   * restart: unless-stopped
#   * the ./data:/app/data volume
#   * env_file: ./.env.local
# so an override is normally NOT required for this package.
#
# scripts/start.sh inspects the merged compose config at deploy time and writes an
# effective override to /opt/swarmclaw/docker-compose.override.yml ONLY if the
# upstream file lacks a restart policy. That generated file sets a scalar `restart`
# key per service and never re-declares volumes (re-declaring a bind mount would
# trigger a "duplicate mount point" error when Compose merges the two files).
#
# This file is kept for reference / manual use. If you drop it next to the compose
# file yourself, keep it scalar-only for the same reason.
services:
  swarmclaw:
    restart: unless-stopped
