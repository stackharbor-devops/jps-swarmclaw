# docker-compose.override.yml — Stack Harbor / SwarmClaw JPS
#
# Installed to /opt/swarmclaw/docker-compose.override.yml by scripts/install.sh and
# merged automatically by Docker Compose. It:
#   * publishes the app on host port 80 so the Jelastic environment URL — what the
#     dashboard "Open in Browser" button opens — reaches SwarmClaw (container :3456);
#   * pins restart: unless-stopped so the app survives node reboots.
#
# Only scalar keys plus an ADDITIVE port are set, so merging with the upstream
# service definition cannot cause duplicate-mount errors. Upstream already maps
# 3456:3456 and 3457:3457, so those host ports stay reachable too.
#
# If host port 80 is unavailable on your node, change "80:3456" (or remove it and
# expose 3456 via a public IP / TCP Endpoint instead — see README).
services:
  swarmclaw:
    restart: unless-stopped
    ports:
      - "80:3456"
